# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect this repo in the Render dashboard ("New +" -> "Blueprint") and Render
# reads this file to provision the service. Secrets (sync: false) are prompted
# for on first deploy and never stored in git.
services:
  - type: web
    name: discord-audio-dashcam
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /ping
    autoDeploy: true
    envVars:
      # --- Secrets: set these in the Render dashboard, not in git ---
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: GUILD_ID
        sync: false
      # --- Tunables (safe to keep in the blueprint) ---
      - key: BUFFER_SECONDS
        value: "15"
      - key: MAX_USERS
        value: "12"
      - key: ENCODE_CONCURRENCY
        value: "1"
      # PORT is injected by Render automatically — do NOT set it here.
