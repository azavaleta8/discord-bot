# fly.toml app configuration file generated for discord-bot-hj0nlw on 2026-05-26T21:19:34Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'discord-bot-hj0nlw'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  BUFFER_SECONDS = '15'
  ENCODE_CONCURRENCY = '1'
  MAX_USERS = '12'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/ping'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
